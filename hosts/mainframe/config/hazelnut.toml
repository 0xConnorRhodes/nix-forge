# NOTE rebuild is required to update the config file

# ─────────────────────────────────────────────────────────────
# General Settings
# ─────────────────────────────────────────────────────────────
[general]
log_level = "info"
theme = "dracula"

# ─────────────────────────────────────────────────────────────
# Watch Folders
# ─────────────────────────────────────────────────────────────
[[watch]]
path = "/scary/files/share/drop"
recursive = false
rules = ["recordings-to-inbox"]

# ─────────────────────────────────────────────────────────────
# Rules
# ─────────────────────────────────────────────────────────────
[[rule]]
name = "recordings-to-inbox"
enabled = true

[rule.condition]
# Matches Google Recorder text export format: Jan+23+at+12-09+PM.txt
# Pattern: Month+Day+at+Hour-Minute+AM/PM.txt
name_regex = "^[A-Z][a-z]{2}\\+\\d{1,2}\\+at\\+\\d{1,2}-\\d{2}\\+[AP]M\\.txt$"

[rule.action]
type = "run"
command = "/home/connor/.nix-profile/bin/uv"
args = ["run", "/home/connor/.local/bin/dsort", "--mv", "--llm"]
